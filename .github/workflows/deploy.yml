name: Deploy React App to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'  # optional: speeds up installs

      - name: Install dependencies
        run: npm install

      - name: Build app (Vite)
        run: npm run build

      # Move Vite build output to root (Azure expects index.html at root)
      - name: Copy build files to root
        run: |
          cp -r dist/* .

      # Add web.config for SPA routing (important for React Router)
      - name: Create web.config
        run: |
          cat << 'EOF' > web.config
          <configuration>
            <system.webServer>
              <rewrite>
                <rules>
                  <rule name="React Routes" stopProcessing="true">
                    <match url=".*" />
                    <conditions logicalGrouping="MatchAll">
                      <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="true" />
                      <add input="{REQUEST_FILENAME}" matchType="IsDirectory" negate="true" />
                    </conditions>
                    <action type="Rewrite" url="/" />
                  </rule>
                </rules>
              </rewrite>
            </system.webServer>
          </configuration>
          EOF

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: react-app-niz
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
